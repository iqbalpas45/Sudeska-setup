<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rekap Tabel Final BA - SUDESKA</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg1: #0f172a;
      --bg2: #1e293b;
      --card: #ffffff;
      --ink: #0b1220;
      --muted: #5b6472;
      --line: #d8dee9;
      --ok: #1d7a45;
      --warn: #b45309;
      --brand: #0b5fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--ink);
      background: radial-gradient(circle at 10% 20%, #1d4ed8 0%, transparent 35%),
                  radial-gradient(circle at 85% 10%, #0ea5e9 0%, transparent 30%),
                  linear-gradient(145deg, var(--bg1), var(--bg2));
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .card {
      width: min(980px, 100%);
      background: var(--card);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(2, 6, 23, 0.35);
      border: 1px solid rgba(255, 255, 255, 0.25);
      overflow: hidden;
    }

    .head {
      padding: 22px 24px;
      color: #fff;
      background: linear-gradient(135deg, #0b5fff, #0ea5e9);
    }

    .head h1 {
      margin: 0;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .head p {
      margin: 8px 0 0;
      font-size: 13px;
      opacity: 0.95;
    }

    .body {
      padding: 22px 24px 24px;
      display: grid;
      gap: 14px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      background: #f8fafc;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .btn {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 11px 14px;
      cursor: pointer;
      color: #fff;
      background: var(--brand);
      font-weight: 600;
      font-size: 13px;
    }

    .btn.secondary {
      background: #334155;
    }

    .hint {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
      line-height: 1.5;
    }

    .status {
      margin: 0;
      font-size: 13px;
      line-height: 1.6;
    }

    .status.ok { color: var(--ok); }
    .status.warn { color: var(--warn); }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      max-height: 360px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      font-size: 12px;
      min-width: 860px;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 8px 9px;
      text-align: left;
      white-space: nowrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #0f172a;
      color: #fff;
      z-index: 1;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="card">
    <section class="head">
      <h1>Rekap Tabel Final Berita Acara</h1>
      <p>Upload export Kobo (XLSX), lalu download hasil tabel ringkas sesuai format BA.</p>
    </section>

    <section class="body">
      <div class="panel">
        <div class="row">
          <input id="koboFile" type="file" accept=".xlsx,.xls" />
          <button id="btnProcess" class="btn" type="button">Proses Tabel Final</button>
          <button id="btnDownload" class="btn secondary" type="button" disabled>Download XLSX Final</button>
        </div>
        <p class="hint" style="margin-top:10px;">
          Format output disamakan dengan BA: Nomor Titik/Patok, Instruksi Kerja (mT/mS), Hasil Penataan Batas (mT/mS), Hasil Supervisi (mT/mS), Keterangan.
        </p>
      </div>

      <div class="panel">
        <p id="status" class="status">Menunggu file export Kobo.</p>
      </div>

      <div class="table-wrap">
        <table id="previewTable">
          <thead></thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    let finalRows = [];
    const BA_COLUMNS = [
      'No',
      'Nomor Titik / Patok',
      'Instruksi Kerja mT',
      'Instruksi Kerja mS',
      'Hasil Penataan Batas mT',
      'Hasil Penataan Batas mS',
      'Hasil Supervisi mT',
      'Hasil Supervisi mS',
      'Keterangan'
    ];

    const els = {
      file: document.getElementById('koboFile'),
      btnProcess: document.getElementById('btnProcess'),
      btnDownload: document.getElementById('btnDownload'),
      status: document.getElementById('status'),
      thead: document.querySelector('#previewTable thead'),
      tbody: document.querySelector('#previewTable tbody')
    };

    const toNumOrBlank = (v) => {
      if (v === null || v === undefined || String(v).trim() === '') return '';
      const n = Number(v);
      return Number.isFinite(n) ? n : '';
    };

    const fmtCoord = (v) => {
      if (v === '' || v === null || v === undefined) return '';
      return Number(v).toFixed(4);
    };

    const pick = (obj, keys, fallback = '') => {
      for (const k of keys) {
        if (Object.prototype.hasOwnProperty.call(obj, k)) {
          const val = obj[k];
          if (val !== null && val !== undefined && String(val).trim() !== '') {
            return val;
          }
        }
      }
      return fallback;
    };

    function mapToFinalRows(rawRows) {
      return rawRows.map((r, idx) => {
        const nomorTitik = pick(r, ['out_nomor_titik', 'pal_master'], '');
        const instruksiMt = toNumOrBlank(pick(r, ['out_instruksi_mt', 'x_insker'], ''));
        const instruksiMs = toNumOrBlank(pick(r, ['out_instruksi_ms', 'y_insker'], ''));

        // Jika out_penataan kosong (karena field hidden), fallback ke koordinat pelaksanaan final.
        const penataanMt = toNumOrBlank(pick(r, ['out_penataan_mt', 'x_pelaksanaan_final'], ''));
        const penataanMs = toNumOrBlank(pick(r, ['out_penataan_ms', 'y_pelaksanaan_final'], ''));

        const supervisiMt = toNumOrBlank(pick(r, ['out_supervisi_mt', 'x_pelaksanaan_final'], ''));
        const supervisiMs = toNumOrBlank(pick(r, ['out_supervisi_ms', 'y_pelaksanaan_final'], ''));

        const keterangan = pick(r, ['out_keterangan_laporan', 'status_final', 'Catatan Lapangan'], '');

        return {
          No: idx + 1,
          'Nomor Titik / Patok': nomorTitik,
          'Instruksi Kerja mT': fmtCoord(instruksiMt),
          'Instruksi Kerja mS': fmtCoord(instruksiMs),
          'Hasil Penataan Batas mT': fmtCoord(penataanMt),
          'Hasil Penataan Batas mS': fmtCoord(penataanMs),
          'Hasil Supervisi mT': fmtCoord(supervisiMt),
          'Hasil Supervisi mS': fmtCoord(supervisiMs),
          Keterangan: keterangan
        };
      }).filter(r => String(r['Nomor Titik / Patok']).trim() !== '');
    }

    function renderPreview(rows) {
      const headTop = [
        'No',
        'Nomor Titik / Patok',
        'Instruksi Kerja',
        'Instruksi Kerja',
        'Hasil Penataan Batas',
        'Hasil Penataan Batas',
        'Hasil Supervisi',
        'Hasil Supervisi',
        'Keterangan'
      ];
      const headSub = ['', '', 'mT', 'mS', 'mT', 'mS', 'mT', 'mS', ''];

      els.thead.innerHTML =
        '<tr>' + headTop.map(h => `<th>${h}</th>`).join('') + '</tr>' +
        '<tr>' + headSub.map(h => `<th>${h}</th>`).join('') + '</tr>';
      els.tbody.innerHTML = rows.slice(0, 120).map(r =>
        '<tr>' + BA_COLUMNS.map(h => `<td>${r[h] ?? ''}</td>`).join('') + '</tr>'
      ).join('');
    }

    function downloadFinal(rows) {
      const aoa = [
        ['No', 'Nomor Titik / Patok', 'Instruksi Kerja', '', 'Hasil Penataan Batas', '', 'Hasil Supervisi', '', 'Keterangan'],
        ['', '', 'mT', 'mS', 'mT', 'mS', 'mT', 'mS', '']
      ];
      rows.forEach((r) => {
        aoa.push(BA_COLUMNS.map((k) => r[k] ?? ''));
      });

      const ws = XLSX.utils.aoa_to_sheet(aoa);
      ws['!merges'] = [
        { s: { r: 0, c: 0 }, e: { r: 1, c: 0 } },
        { s: { r: 0, c: 1 }, e: { r: 1, c: 1 } },
        { s: { r: 0, c: 2 }, e: { r: 0, c: 3 } },
        { s: { r: 0, c: 4 }, e: { r: 0, c: 5 } },
        { s: { r: 0, c: 6 }, e: { r: 0, c: 7 } },
        { s: { r: 0, c: 8 }, e: { r: 1, c: 8 } }
      ];
      ws['!cols'] = [
        { wch: 6 },
        { wch: 20 },
        { wch: 15 },
        { wch: 15 },
        { wch: 18 },
        { wch: 18 },
        { wch: 16 },
        { wch: 16 },
        { wch: 56 }
      ];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'tabel_final_ba');

      const out = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
      const blob = new Blob([out], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });

      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'tabel_final_berita_acara.xlsx';
      a.click();
      URL.revokeObjectURL(a.href);
    }

    async function processFile() {
      const file = els.file.files && els.file.files[0];
      if (!file) {
        els.status.className = 'status warn';
        els.status.textContent = 'Pilih dulu file export Kobo (XLSX).';
        return;
      }

      try {
        els.status.className = 'status';
        els.status.textContent = 'Memproses file...';

        const buf = await file.arrayBuffer();
        const wb = XLSX.read(buf, { type: 'array' });
        const firstSheet = wb.SheetNames[0];
        const ws = wb.Sheets[firstSheet];
        const rawRows = XLSX.utils.sheet_to_json(ws, { defval: '' });

        finalRows = mapToFinalRows(rawRows);
        renderPreview(finalRows);

        els.btnDownload.disabled = finalRows.length === 0;
        if (finalRows.length === 0) {
          els.status.className = 'status warn';
          els.status.textContent = 'Data tidak terbaca. Pastikan file adalah export hasil submit Kobo.';
          return;
        }

        els.status.className = 'status ok';
        els.status.textContent = `Sukses: ${finalRows.length} baris siap diunduh sebagai tabel final BA.`;
      } catch (err) {
        console.error(err);
        els.status.className = 'status warn';
        els.status.textContent = 'Gagal memproses file. Cek format file export Kobo Anda.';
      }
    }

    els.btnProcess.addEventListener('click', processFile);
    els.btnDownload.addEventListener('click', () => downloadFinal(finalRows));
  </script>
</body>
</html>
